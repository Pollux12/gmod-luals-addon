name: release-gluals
on:
  workflow_dispatch:
  push:
    branches:
      - gluals-gmod
  schedule:
    - cron: "0 0 1 * *"
jobs:
  release:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Check if there have been changes to the wiki
        if: ${{ github.event_name == 'schedule' }}
        id: wiki_confirm_no_changes
        continue-on-error: true
        run: |
          if [ "$RUNNER_DEBUG" = "1" ]; then
            exit 1
          else
            npm run wiki-check-changed $(git tag -l --sort=-v:refname)
          fi
      - name: Scrape wiki
        if: ${{ github.event_name != 'schedule' || steps.wiki_confirm_no_changes.outcome == 'failure' }}
        run: npm run scrape-wiki
      - name: Run tests
        if: ${{ github.event_name != 'schedule' || steps.wiki_confirm_no_changes.outcome == 'failure' }}
        run: npm test
      - name: Format the output with StyLua
        if: ${{ github.event_name != 'schedule' || steps.wiki_confirm_no_changes.outcome == 'failure' }}
        uses: JohnnyMorganz/stylua-action@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --no-editorconfig output/
      - name: Tag latest scrape revision
        if: ${{ github.event_name != 'schedule' || steps.wiki_confirm_no_changes.outcome == 'failure' }}
        run: |
          build_tag=$(date -u +%Y-%m-%dT%H:%M:%SZ | sed 's/:/-/g' | sed 's/T/_/')
          tag="$build_tag"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists. Falling back to build run number."
            tag="${build_tag}-${GITHUB_RUN_NUMBER}"
          fi
          git tag "$tag"
          git push origin "refs/tags/$tag"
      - name: Publish annotations to branch
        if: ${{ github.event_name != 'schedule' || steps.wiki_confirm_no_changes.outcome == 'failure' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash only the final .lua files + metadata to a temp dir before switching branches.
          # This is necessary because `git rm -rf .` only removes tracked files; output/ is
          # gitignored (untracked) so it survives, causing duplicates when git add -A picks it up.
          tmpdir=$(mktemp -d)
          find output/ -maxdepth 1 -type f -name '*.lua' -exec cp {} "$tmpdir/" \;
          cp output/__metadata.json "$tmpdir/"

          # Create orphan branch, then wipe EVERYTHING (tracked + untracked + ignored)
          git checkout --orphan gluals-annotations
          git rm -rf .
          git clean -fdx

          # Restore only the final annotation files
          cp "$tmpdir/"*.lua .
          cp "$tmpdir/__metadata.json" .
          git add -A

          # Commit with timestamp
          commitMsg="Update GLuaLS annotations - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git commit -m "$commitMsg"

          # Force push to publish
          git push -f origin gluals-annotations
